---
name: Go CI

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    paths-ignore:
      - "README.md"
  push:
    paths-ignore:
      - "README.md"
  schedule:
    - cron: "0 13 * * 5"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Run linters
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Restore test data cache
        id: restore-cache
        if: github.event_name != 'schedule'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ripedb/tests/data
          key: tests-data-${{ hashFiles('scripts/download-dumps.sh') }}

      - name: Download test data
        if: (github.event_name != 'schedule' && steps.restore-cache.outputs.cache-hit != 'true') || github.event_name == 'schedule'
        run: scripts/download-dumps.sh

      - name: Save test data cache
        if: github.event_name == 'schedule' || (github.event_name != 'schedule' && steps.restore-cache.outputs.cache-hit != 'true')
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ripedb/tests/data
          key: tests-data-${{ hashFiles('scripts/download-dumps.sh') }}

      - name: Run tests
        run: go test ./...
